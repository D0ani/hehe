<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wichtige Umfrage 📋</title>
    <meta property="og:title"       content="Wichtige Umfrage 📋">
    <meta property="og:description" content="Bitte kurz ausfüllen!">
    <meta name="description"        content="Bitte kurz ausfüllen!">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #fff0f4 0%, #ffdde6 45%, #ffccd9 100%);
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* ── floating hearts ──────────────────────────────────────────────────── */
        .heart-bg {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0.13;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            from { transform: translateY(110vh) rotate(-8deg); }
            to   { transform: translateY(-130px) rotate(8deg); }
        }

        /* ── start screen ─────────────────────────────────────────────────────── */
        .start-screen {
            position: relative;
            z-index: 3;
            text-align: center;
            padding: 2rem;
            animation: fadeInUp 0.8s ease both;
        }
        .question {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(1.65rem, 4.8vw, 2.9rem);
            color: #a3203a;
            margin-bottom: 0.5rem;
            line-height: 1.3;
            text-shadow: 0 2px 8px rgba(163, 32, 58, 0.12);
        }
        .tagline {
            font-size: 1rem;
            color: #c8849a;
            margin-bottom: 2.6rem;
            font-style: italic;
            font-weight: 300;
        }

        /* ── button row ───────────────────────────────────────────────────────── */
        .btn-row {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            align-items: center;
        }

        /* ── buttons ──────────────────────────────────────────────────────────── */
        .btn {
            display: inline-block;
            padding: 0.88rem 2.3rem;
            border: none;
            border-radius: 50px;
            font-size: 1.06rem;
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            font-weight: 700;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            letter-spacing: 0.2px;
        }
        .btn-ja {
            background: linear-gradient(135deg, #f06292 0%, #ad1457 100%);
            color: #fff;
            box-shadow: 0 7px 24px rgba(173, 20, 87, 0.38);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-ja:hover  { transform: translateY(-3px) scale(1.04); box-shadow: 0 12px 30px rgba(173, 20, 87, 0.46); }
        .btn-ja:active { transform: translateY(-1px) scale(1.01); }

        .btn-nein {
            background: linear-gradient(135deg, #f8d0da 0%, #e8aabb 100%);
            color: #9b4060;
            box-shadow: 0 4px 14px rgba(180, 110, 140, 0.25);
        }
        .btn-nein.is-fixed {
            position: fixed;
            margin: 0;
            z-index: 10;
        }
        .btn-nein.dodging {
            transition: left 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        top  0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* ── image reaction popup ─────────────────────────────────────────────── */
        .float-msg {
            position: fixed;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 30px rgba(163, 32, 58, 0.30);
            pointer-events: none;
            z-index: 9999;
            width: 190px;
            overflow: hidden;
            transform: translateX(-50%);
            animation: floatMsg 2.8s ease forwards;
        }
        .float-msg img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            object-position: center top;
            display: block;
        }
        .float-msg .float-label {
            padding: 0.55rem 0.9rem;
            font-size: 0.85rem;
            font-weight: 700;
            color: #a3203a;
            line-height: 1.35;
            text-align: center;
        }
        @keyframes floatMsg {
            0%   { opacity: 0; transform: translateX(-50%) translateY(14px) scale(0.7);  }
            10%  { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1.05); }
            15%  { transform: translateX(-50%) translateY(0) scale(1); }
            75%  { opacity: 1; transform: translateX(-50%) translateY(-12px) scale(1);   }
            100% { opacity: 0; transform: translateX(-50%) translateY(-26px) scale(0.9); }
        }

        /* ── overlay & modal ──────────────────────────────────────────────────── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(65, 8, 22, 0.42);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .overlay.open { display: flex; animation: fadeIn 0.26s ease; }

        .modal {
            background: #fff;
            border-radius: 24px;
            padding: 2.5rem 2.1rem 2.1rem;
            max-width: 430px;
            width: calc(100% - 2rem);
            text-align: center;
            box-shadow: 0 24px 60px rgba(65, 8, 22, 0.24);
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            max-height: calc(100dvh - 2rem);
        }
        .modal::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #f06292, #ad1457, #f06292);
            background-size: 200% auto;
            animation: shimmer 2.6s linear infinite;
        }
        .modal-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.24rem;
            color: #a3203a;
            line-height: 1.55;
            margin-bottom: 1.75rem;
        }

        /* ── option buttons ───────────────────────────────────────────────────── */
        .option-btn {
            display: block;
            width: 100%;
            padding: 0.84rem 1.2rem;
            margin-bottom: 0.65rem;
            border: 2px solid #f4b8c8;
            border-radius: 50px;
            background: #fff;
            color: #ad1457;
            font-size: 0.97rem;
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.22s ease;
        }
        .option-btn:last-of-type { margin-bottom: 0; }
        .option-btn:hover {
            background: linear-gradient(135deg, #f06292, #ad1457);
            color: #fff;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 7px 18px rgba(173, 20, 87, 0.28);
        }

        /* ── abbruch button ───────────────────────────────────────────────────── */
        .btn-abbruch {
            background: none;
            border: 2px dashed #f0c0cc;
            color: #c8a0b0;
            padding: 0.62rem 1.8rem;
            border-radius: 50px;
            font-size: 0.88rem;
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.9rem;
            display: inline-block;
            transition: all 0.2s;
        }
        .btn-abbruch:hover { background: #fff5f7; border-color: #e8a0b0; color: #b06080; }

        /* ── step 2: verdict + datetime ───────────────────────────────────────── */
        .verdict-box {
            background: linear-gradient(135deg, #fff5f8, #ffe8ee);
            border-radius: 14px;
            padding: 0.95rem 1.2rem;
            margin-bottom: 1.3rem;
            font-style: italic;
            color: #b06080;
            font-size: 1rem;
            line-height: 1.55;
            border-left: 3px solid #f06292;
        }
        .when-label {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.14rem;
            color: #a3203a;
            margin-bottom: 0.9rem;
        }
        .datetime-row {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.3rem;
        }
        .dt-group { flex: 1; text-align: left; }
        .dt-label {
            display: block;
            font-size: 0.76rem;
            font-weight: 700;
            color: #c8849a;
            margin-bottom: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }
        .date-input {
            width: 100%;
            padding: 0.72rem 0.8rem;
            border: 2px solid #f4b8c8;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            color: #ad1457;
            background: #fffafa;
            outline: none;
            display: block;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .date-input:focus {
            border-color: #ad1457;
            box-shadow: 0 0 0 3px rgba(173, 20, 87, 0.1);
        }
        .date-input.error {
            border-color: #e53935;
            box-shadow: 0 0 0 3px rgba(229, 57, 53, 0.12);
            animation: shake 0.36s ease;
        }
        .btn-fix {
            background: linear-gradient(135deg, #f06292 0%, #ad1457 100%);
            color: #fff;
            border: none;
            padding: 0.88rem 2.5rem;
            border-radius: 50px;
            font-size: 1.06rem;
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 7px 22px rgba(173, 20, 87, 0.36);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-fix:hover  { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(173, 20, 87, 0.46); }
        .btn-fix:active { transform: translateY(-1px); }

        /* ── sliders (dauer + hype) ───────────────────────────────────────────── */
        .slider-block { margin-bottom: 1.3rem; text-align: left; }
        .pink-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 6px;
            background: linear-gradient(90deg, #f8d0da 0%, #f06292 55%, #ad1457 100%);
            outline: none;
            cursor: pointer;
            margin-top: 0.4rem;
        }
        .pink-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px; height: 24px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid #ad1457;
            box-shadow: 0 2px 8px rgba(173, 20, 87, 0.4);
            cursor: pointer;
        }
        .pink-slider::-moz-range-thumb {
            width: 18px; height: 18px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid #ad1457;
            box-shadow: 0 2px 8px rgba(173, 20, 87, 0.4);
            cursor: pointer;
        }
        .slider-ends {
            display: flex;
            justify-content: space-between;
            font-size: 0.68rem;
            font-weight: 700;
            color: #c8849a;
            margin-top: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .slider-value {
            text-align: center;
            font-weight: 800;
            color: #ad1457;
            font-size: 1.02rem;
            margin-top: 0.45rem;
        }
        .verdict-gif {
            width: 88px;
            border-radius: 12px;
            display: block;
            margin: 0 auto 0.8rem;
            filter: drop-shadow(0 4px 10px rgba(163, 32, 58, 0.25));
        }

        /* ── final screen ─────────────────────────────────────────────────────── */
        .final-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.42rem;
            color: #a3203a;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .final-date-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 0.8rem;
        }
        .final-gif-over {
            width: 105px;
            border-radius: 12px;
            display: block;
            margin: 0 auto -22px;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 4px 10px rgba(163,32,58,0.25));
            animation: gifBounceIn 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
        }
        @keyframes gifBounceIn {
            0%   { opacity: 0; transform: scale(0.2) translateY(30px); }
            65%  { transform: scale(1.1) translateY(-4px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .final-date-box {
            display: block;
            background: linear-gradient(135deg, #fff5f8, #ffe0e8);
            border-radius: 14px;
            padding: 1.4rem 1.5rem 0.85rem;
            font-size: 0.9rem;
            color: #c06080;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }
        .email-note {
            display: block;
            font-size: 0.82rem;
            color: #d4a0b4;
            font-style: italic;
            margin-top: 0.6rem;
        }

        /* ── confetti ─────────────────────────────────────────────────────────── */
        .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
        @keyframes confettiFall {
            0%   { transform: translateY(0)     rotate(0deg)   scaleX(1);   opacity: 1; }
            85%  { opacity: 1; }
            100% { transform: translateY(110vh) rotate(820deg) scaleX(0.7); opacity: 0; }
        }

        /* ── decorative memes ─────────────────────────────────────────────────── */
        .deco-meme {
            position: fixed;
            border-radius: 14px;
            z-index: 1;
            transition: scale 0.25s ease, filter 0.25s ease;
            filter: drop-shadow(0 3px 10px rgba(0,0,0,0.15));
            pointer-events: auto;
            cursor: pointer;
        }
        .deco-meme:hover {
            scale: 1.18;
            filter: drop-shadow(0 7px 18px rgba(0,0,0,0.28));
            z-index: 50;
        }
        /* positions */
        .meme-bl { bottom: 14px; left:   14px;  width: 118px; transform: rotate(-6deg);  animation: memeBob 4.0s ease-in-out infinite 0.0s; }
        .meme-tl { top:    14px; left:   14px;  width:  78px; transform: rotate( 7deg);  animation: memeBob 5.8s ease-in-out infinite 1.8s; }
        .meme-tr { top:    14px; right: -16px;  width:  90px; transform: rotate( 9deg);  animation: memeBob 5.0s ease-in-out infinite 0.6s; }
        .meme-br { bottom: 14px; right:  14px;  width: 100px; transform: rotate( 4deg);  animation: memeBob 3.8s ease-in-out infinite 0.3s; }
        .meme-ml { top:    42%;  left:  -12px;  width:  86px; transform: rotate(-10deg); animation: memeBob 4.4s ease-in-out infinite 1.0s; }
        .meme-mr { top:    28%;  right: -12px;  width:  84px; transform: rotate( 10deg); animation: memeBob 6.2s ease-in-out infinite 2.2s; }
        .meme-ll { top:    66%;  left:  -14px;  width:  92px; transform: rotate(-7deg);  animation: memeBob 5.1s ease-in-out infinite 2.8s; }
        .meme-rl { top:    60%;  right: -14px;  width:  96px; transform: rotate( 6deg);  animation: memeBob 4.7s ease-in-out infinite 1.4s; }
        /* love decorations — slightly bigger & more visible */
        .meme-love1 { bottom: 18px; left:  145px; width: 115px; transform: rotate(-5deg); animation: memeBob 4.3s ease-in-out infinite 0.7s; }
        .meme-love2 { bottom: 18px; right: 145px; width: 115px; transform: rotate( 5deg); animation: memeBob 5.3s ease-in-out infinite 1.6s; }
        /* new spongebob / adventure time decorations */
        .meme-ul { top: 17%;  left:  -12px; width: 82px; transform: rotate(-9deg); animation: memeBob 5.5s ease-in-out infinite 0.4s; }
        .meme-ur { top: 44%;  right: -14px; width: 90px; transform: rotate( 8deg); animation: memeBob 4.9s ease-in-out infinite 2.0s; }
        .meme-bc { bottom: -6px; left: 50%; margin-left: -47px; width: 94px; transform: rotate(3deg); animation: memeBob 4.2s ease-in-out infinite 1.2s; }

        @keyframes memeBob {
            0%,100% { translate: 0 0; }
            50%      { translate: 0 -10px; }
        }

        @media (max-width: 700px) {
            /* alle sichtbar, mobile-optimierte Größen */
            .meme-bl    { width: 88px;  bottom: 6px;  left: 6px;           }
            .meme-br    { width: 88px;  bottom: 6px;  right: 6px;          }
            .meme-tl    { display: block; width: 70px;  top: 6px;    left: 6px;    transform: rotate(7deg);   }
            .meme-tr    { display: block; width: 70px;  top: 6px;    right: -10px; transform: rotate(9deg);   }
            .meme-ml    { display: block; width: 64px;  top: 34%;    left: -10px;  transform: rotate(-10deg); }
            .meme-mr    { display: block; width: 64px;  top: 22%;    right: -10px; transform: rotate(10deg);  }
            .meme-ll    { display: block; width: 66px;  top: 63%;    left: -10px;  transform: rotate(-7deg);  }
            .meme-rl    { display: block; width: 68px;  top: 58%;    right: -10px; transform: rotate(6deg);   }
            .meme-love1 { display: block; width: 84px;  bottom: 6px; left: 96px;   transform: rotate(-5deg);  }
            .meme-love2 { display: block; width: 84px;  bottom: 6px; right: 96px;  transform: rotate(5deg);   }
            .meme-ul    { width: 58px;  top: 15%;    left: -10px;  transform: rotate(-9deg); }
            .meme-ur    { width: 60px;  top: 42%;    right: -10px; transform: rotate(8deg);  }
            .meme-bc    { display: none; }
        }

        /* ── mobile fine-tuning ───────────────────────────────────────────────── */
        @media (max-width: 520px) {
            .start-screen { padding: 1.5rem 1rem; }
            .tagline      { margin-bottom: 2rem; }
            .btn          { padding: 0.8rem 2rem; font-size: 1rem; }

            .modal        { padding: 1.7rem 1.2rem 1.4rem; border-radius: 18px; }
            .modal-title  { font-size: 1.05rem; margin-bottom: 1.2rem; }
            .option-btn   { padding: 0.72rem 1rem; margin-bottom: 0.55rem; font-size: 0.92rem; }
            .btn-abbruch  { margin-top: 0.7rem; padding: 0.55rem 1.5rem; font-size: 0.82rem; }

            .verdict-gif  { width: 68px; margin-bottom: 0.65rem; }
            .verdict-box  { font-size: 0.9rem; padding: 0.75rem 0.95rem; margin-bottom: 1rem; }
            .when-label   { font-size: 1.02rem; margin-bottom: 0.7rem; }
            .datetime-row { flex-direction: column; gap: 0.7rem; margin-bottom: 1rem; }
            .slider-block { margin-bottom: 1rem; }
            .btn-fix      { width: 100%; padding: 0.8rem 1rem; }

            .float-msg    { width: 150px; }
            .float-msg img { height: 112px; }
            .float-msg .float-label { font-size: 0.78rem; padding: 0.45rem 0.7rem; }

            .final-title    { font-size: 1.22rem; }
            .final-date-box { padding: 1.2rem 1.1rem 0.75rem; font-size: 0.85rem; }
            .final-gif-over { width: 90px; }
        }

        /* ── animations ───────────────────────────────────────────────────────── */
        @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp  { from { opacity: 0; transform: translateY(38px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes shake    { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        @keyframes shimmer  { to { background-position: 200% center; } }
    </style>
</head>
<body>

<main class="start-screen">
    <h1 class="question">Willst du mit mir auf ein Date? 💕</h1>
    <p class="tagline">Überleg nicht zu lange…</p>
    <div class="btn-row" id="btnRow">
        <button class="btn btn-ja" id="btnJa">Ja 💖</button>
        <button class="btn btn-nein" id="btnNein">Nein</button>
    </div>
</main>

<div class="overlay" id="overlay">
    <div class="modal" id="modal"></div>
</div>

<div class="confetti-wrap" id="confettiWrap"></div>

<!-- decorative memes scattered around the page -->
<img src="images/dog-splits.png" class="deco-meme meme-bl" alt="">
<img src="images/dog-hoodie.jpg" class="deco-meme meme-tl" alt="">
<img src="images/cat-chain.jpg"  class="deco-meme meme-tr" alt="">
<img src="images/dog-doge.jpg"   class="deco-meme meme-br" alt="">
<img src="images/dog-chad.jpg"        class="deco-meme meme-ml" alt="">
<img src="images/cat-sus.jpg"         class="deco-meme meme-mr" alt="">
<img src="images/anim-dog-laptop.webp" class="deco-meme meme-ll" alt="">
<img src="images/anim-husky-happy.webp" class="deco-meme meme-rl" alt="">
<img src="images/anim-cat-loveyou.webp" class="deco-meme meme-love1" alt="">
<img src="images/anim-dog-teamo.webp"   class="deco-meme meme-love2" alt="">
<img src="images/at-gunter-dance.gif"   class="deco-meme meme-ul" alt="">
<img src="images/sb-imagination.gif"    class="deco-meme meme-ur" alt="">
<img src="images/sb-pants.gif"          class="deco-meme meme-bc" alt="">

<script>
/* ── Floating hearts ─────────────────────────────────────────────── */
const HEARTS = ['❤️','💕','💖','💗','💓','💝','🌸','✨'];
for (let i = 0; i < 26; i++) {
    const el = document.createElement('div');
    el.className = 'heart-bg';
    el.textContent = HEARTS[i % HEARTS.length];
    el.style.cssText =
        `left:${(Math.random()*100).toFixed(1)}vw;` +
        `font-size:${(Math.random()*1.4+0.9).toFixed(2)}rem;` +
        `animation-duration:${(Math.random()*13+9).toFixed(1)}s;` +
        `animation-delay:${(-Math.random()*22).toFixed(1)}s;`;
    document.body.appendChild(el);
}

/* ── Image reaction popup ─────────────────────────────────────────── */
function showFloatMsg(x, y, msg) {
    const el = document.createElement('div');
    el.className = 'float-msg';
    el.innerHTML =
        `<img src="images/${msg.img}" alt="">` +
        `<div class="float-label">${msg.text}</div>`;
    el.style.left = `${Math.max(80, Math.min(x, window.innerWidth - 80))}px`;
    el.style.top  = `${Math.max(30, y - 130)}px`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2800);
}

/* ── Nein button: funny messages ─────────────────────────────────── */
const NEIN_MSGS = [
    { img: 'cat-sus.jpg',              text: 'Bro was?! 😐' },

/* ── Nein-button dodge logic ──────────────────────────────────────── */
const btnNein = document.getElementById('btnNein');
let isFixed = false;

function makeFixed() {
    if (isFixed) return;
    isFixed = true;
    const rect = btnNein.getBoundingClientRect();
    const sp = document.createElement('div');
    sp.style.cssText = `width:${rect.width}px;height:${rect.height}px;flex-shrink:0;pointer-events:none;`;
    btnNein.parentNode.insertBefore(sp, btnNein);
    document.body.appendChild(btnNein);
    btnNein.classList.add('is-fixed');
    btnNein.style.left = `${rect.left}px`;
    btnNein.style.top  = `${rect.top}px`;
}

function dodge() {
    const margin = 20;
    const bw = btnNein.offsetWidth  || 100;
    const bh = btnNein.offsetHeight || 44;
    btnNein.style.left = `${Math.max(margin, Math.random() * (window.innerWidth  - bw - margin))}px`;
    btnNein.style.top  = `${Math.max(margin, Math.random() * (window.innerHeight - bh - margin))}px`;
}

function handleNein(msgX, msgY) {
    const wasFixed = isFixed;
    makeFixed();
    if (!wasFixed) {
        dodge();
        requestAnimationFrame(() => btnNein.classList.add('dodging'));
    } else {
        dodge();
    }
    showFloatMsg(msgX, msgY, randomNeinMsg());
}

btnNein.addEventListener('mouseover', e => handleNein(e.clientX, e.clientY));
btnNein.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    handleNein(t.clientX, t.clientY);
}, { passive: false });

            </div>

                <label class="dt-label">Uhrzeit ⏰</label>
                <input type="time" class="date-input" id="timeInput">
            </div>
        </div>

        <div class="slider-block">
            <span class="dt-label">Und wie gehyped bist du? 🔥</span>
            <input type="range" class="pink-slider" id="hypeSlider" min="0" max="5" step="1" value="3" oninput="updateHype(this.value)">

}

window.updateDur = function(v) {

};

window.updateHype = function(v) {
    document.getElementById('hypeValue').textContent = HYPE_LEVELS[v];
    if (+v === 5) launchConfetti(24);
};

/* ── Step 3 — confirmation + email ──────────────────────────────── */
window.fixDate = function() {
    const dateInp = document.getElementById('dateInput');
    const timeInp = document.getElementById('timeInput');
    let ok = true;
    [dateInp, timeInp].forEach(inp => {
        if (!inp.value) {
            inp.classList.remove('error');
            void inp.offsetHeight;
            inp.classList.add('error');
            setTimeout(() => inp.classList.remove('error'), 500);
            ok = false;
        }
    });
    if (!ok) return;

    const dt        = new Date(`${dateInp.value}T${timeInp.value}`);
    const formatted = dt.toLocaleDateString('de-DE', {
        weekday: 'long', year: 'numeric', month: 'long',
        day: 'numeric', hour: '2-digit', minute: '2-digit',
    });

    const durSlider  = document.getElementById('durSlider');
    const duration   = durSlider ? `${String(durSlider.value).replace('.', ',')} Std.` : '';
    const hype       = HYPE_LEVELS[document.getElementById('hypeSlider').value];
    const FINAL_GIFS = ['cat-dance.gif', 'sb-dance.gif'];
    const finalGif   = FINAL_GIFS[Math.floor(Math.random() * FINAL_GIFS.length)];

    setContent(`
        <p class="final-title">Perfekt! Ist notiert.<br>Ich zähle die Tage! ❤️</p>
        <div class="final-date-wrap">
            <img src="images/${finalGif}" class="final-gif-over" alt="happy dance">
            <div class="final-date-box">
                📅 ${formatted}
                ${currentFood ? `<br>🍽️ ${currentFood}` : ''}
                ${duration ? `<br>⏱️ Dauer: ${duration}` : ''}
                <br>🔥 Hype-Level: ${hype}
            </div>
        </div>
        <span class="email-note">📬 Eine Bestätigung wurde verschickt!</span>
    `);

    launchConfetti(220);
    sendEmail(formatted, duration, hype);
};

async function sendEmail(formatted, duration, hype) {
    const fields = {
        '_subject':  '📅 Date fixiert! 💕',
        '_captcha':  'false',
        '_template': 'table',
        'Aktivität':        currentActivity.label,
        'Datum & Uhrzeit':  formatted,
        'Hype-Level':       hype,
    };
    if (currentFood) fields['Essensrichtung'] = currentFood;
    if (duration)    fields['Dauer']          = duration;
    try {
        await fetch('https://formsubmit.co/ajax/leinadtom@gmail.com', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify(fields)
        });
    } catch (_) { /* silent fail — user still sees success screen */ }
}

/* ── Confetti ────────────────────────────────────────────────────── */
function launchConfetti(count = 130) {
    const wrap   = document.getElementById('confettiWrap');
    const colors = ['#f06292','#ad1457','#ffd700','#ff85a1','#ffffff','#ff4081','#e91e63','#ffc0cb','#ffb7c5'];
    for (let i = 0; i < count; i++) {
        setTimeout(() => {
            const p   = document.createElement('div');
            const sz  = (Math.random() * 12 + 5).toFixed(1);
            const dur = (Math.random() * 2.4 + 1.8).toFixed(2);
            p.style.cssText =
                'position:absolute;' +
                `left:${(Math.random()*100).toFixed(1)}vw;` +
                'top:-18px;' +
                `width:${sz}px;height:${sz}px;` +
                `border-radius:${Math.random()>0.45?'50%':'3px'};` +
                `background:${colors[Math.floor(Math.random()*colors.length)]};` +
                `animation:confettiFall ${dur}s linear forwards;`;
            wrap.appendChild(p);
            setTimeout(() => p.remove(), (+dur + 0.7) * 1000);
        }, i * 18);
    }
}
